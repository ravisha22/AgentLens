## Architecture Overview

AgentLens follows a modular architecture with three primary layers:

```
┌─────────────────────────────────────┐
│           extension.ts              │  ← VS Code activation & lifecycle
├─────────────────────────────────────┤
│           providers/                │  ← TreeView, Webview, & data providers
├──────────────────┬──────────────────┤
│     core/        │   adapters/      │  ← Business logic & agent integrations
├──────────────────┴──────────────────┤
│           types.ts                  │  ← Shared type definitions
└─────────────────────────────────────┘
```

---

## Core API

The `core/` module contains the central business logic for context window tracking, token counting, and telemetry aggregation.

### `ContextWindowTracker`

Monitors and calculates real-time context window utilization.

```typescript
class ContextWindowTracker {
  /**
   * Returns the current context window usage.
   * @returns ContextWindowState — includes token count, max tokens, and utilization percentage.
   */
  getState(): ContextWindowState;

  /**
   * Updates the context window state based on new telemetry data.
   * @param telemetry - Raw telemetry payload from the active agent adapter.
   */
  update(telemetry: AgentTelemetry): void;

  /**
   * Subscribes to context window state changes.
   * @param listener - Callback invoked whenever the state changes.
   * @returns Disposable — call `.dispose()` to unsubscribe.
   */
  onDidChange(listener: (state: ContextWindowState) => void): Disposable;
}
```

### `ModelDetector`

Identifies the active AI model being used by the coding agent.

```typescript
class ModelDetector {
  /**
   * Detects the current model from agent process signals and configuration.
   * @returns ModelInfo or `undefined` if no model is detected.
   */
  detect(): ModelInfo | undefined;

  /**
   * Subscribes to model change events.
   * @param listener - Callback invoked when the detected model changes.
   * @returns Disposable
   */
  onDidChangeModel(listener: (model: ModelInfo | undefined) => void): Disposable;
}
```

### `FileTracker`

Tracks which files the AI agent is reading from or writing to.

```typescript
class FileTracker {
  /**
   * Returns the list of files currently in the agent's context.
   * @returns TrackedFile[] — array of tracked file entries with metadata.
   */
  getTrackedFiles(): TrackedFile[];

  /**
   * Subscribes to file tracking changes.
   * @param listener - Callback invoked when tracked files change.
   * @returns Disposable
   */
  onDidChangeFiles(listener: (files: TrackedFile[]) => void): Disposable;
}
```

### `DocumentationHealthAnalyzer`

Assesses the health and coverage of documentation in the workspace.

```typescript
class DocumentationHealthAnalyzer {
  /**
   * Analyzes documentation health across the workspace.
   * @returns DocumentationHealthReport — coverage metrics, staleness indicators, and suggestions.
   */
  analyze(): Promise<DocumentationHealthReport>;

  /**
   * Subscribes to documentation health changes (e.g., after file saves).
   * @param listener - Callback with updated report.
   * @returns Disposable
   */
  onDidChangeHealth(listener: (report: DocumentationHealthReport) => void): Disposable;
}
```

