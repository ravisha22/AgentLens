## Adapters

The `adapters/` module provides integration layers for different AI coding agents. Each adapter implements a common interface to normalize telemetry from a specific agent.

### `AgentAdapter` Interface

```typescript
interface AgentAdapter {
  /** Unique identifier for the adapter (e.g., "copilot", "cursor", "cline"). */
  readonly id: string;

  /** Human-readable name of the agent. */
  readonly name: string;

  /**
   * Checks whether this agent is currently active in the workspace.
   * @returns `true` if the agent is detected and running.
   */
  isActive(): Promise<boolean>;

  /**
   * Collects raw telemetry from the agent.
   * @returns AgentTelemetry — real, unprocessed telemetry data.
   */
  collectTelemetry(): Promise<AgentTelemetry>;

  /**
   * Starts listening for real-time telemetry events from the agent.
   * @param handler - Callback invoked on each telemetry event.
   * @returns Disposable
   */
  startListening(handler: (event: TelemetryEvent) => void): Disposable;

  /**
   * Cleans up resources held by the adapter.
   */
  dispose(): void;
}
```

### Supported Adapters

| Adapter | Agent | Status |
|---------|-------|--------|
| `CopilotAdapter` | GitHub Copilot | ✅ Supported |
| `CursorAdapter` | Cursor AI | ✅ Supported |
| `ClineAdapter` | Cline | ✅ Supported |
| `GenericAdapter` | Fallback / custom agents | ✅ Supported |

### Example: Using an Adapter

```typescript
import { CopilotAdapter } from './adapters';

const adapter = new CopilotAdapter();

if (await adapter.isActive()) {
  const telemetry = await adapter.collectTelemetry();
  console.log(`Tokens used: ${telemetry.tokensUsed}`);
  console.log(`Model: ${telemetry.modelId}`);
}
```

