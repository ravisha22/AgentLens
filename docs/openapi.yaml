## Error Handling

All adapter and core methods follow consistent error handling patterns:

```typescript
interface AgentLensError {
  code: 'ADAPTER_NOT_FOUND' | 'AGENT_INACTIVE' | 'TELEMETRY_TIMEOUT' | 'PARSE_ERROR';
  message: string;
  adapterId?: string;
  cause?: Error;
}
```

Errors are surfaced through:
- The VS Code **Output Channel** (`AgentLens` channel)
- `TelemetryEvent` with `type: 'error'`
- The webview UI as user-facing status messages

