## Testing

Tests are located in the `test/` directory and can be executed via:

```bash
npm run test
```

### Test Structure

```
test/
├── core/              # Unit tests for core modules
├── adapters/          # Unit tests for agent adapters
├── providers/         # Tests for VS Code providers
└── integration/       # End-to-end integration tests
```

### Writing Tests

```typescript
import * as assert from 'assert';
import { ContextWindowTracker } from '../core';

suite('ContextWindowTracker', () => {
  test('should initialize with zero utilization', () => {
    const tracker = new ContextWindowTracker();
    const state = tracker.getState();
    assert.strictEqual(state.tokensUsed, 0);
    assert.strictEqual(state.utilizationPercent, 0);
  });

  test('should update state from telemetry', () => {
    const tracker = new ContextWindowTracker();
    tracker.update({
      adapterId: 'copilot',
      tokensUsed: 4096,
      modelId: 'gpt-4o',
      files: [],
      metadata: {},
      timestamp: new Date(),
    });
    const state = tracker.getState();
    assert.strictEqual(state.tokensUsed, 4096);
  });
});
```

