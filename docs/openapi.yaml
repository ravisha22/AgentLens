## Events & Telemetry

AgentLens uses an event-driven architecture internally. All events flow through a central event bus.

### Event Flow

```
Agent Process → Adapter → Core Tracker → Provider → Webview/TreeView
```

### Key Principles

1. **No simulated data** — Every metric originates from real agent telemetry. If an agent is not active, values are reported as unknown rather than estimated.
2. **Disposable pattern** — All event subscriptions return a `Disposable` object. Call `.dispose()` to unsubscribe and prevent memory leaks.
3. **Polling + Push** — Adapters use polling as a baseline (`agentlens.pollingInterval`) but switch to push-based updates when the agent supports it.

