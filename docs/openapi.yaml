## Extension Entry Point

### `extension.ts`

The main entry point for the VS Code extension lifecycle.

```typescript
/**
 * Called when the extension is activated.
 * Registers providers, initializes adapters, and starts telemetry collection.
 * @param context - The VS Code extension context.
 */
export function activate(context: vscode.ExtensionContext): void;

/**
 * Called when the extension is deactivated.
 * Cleans up all resources, stops telemetry listeners.
 */
export function deactivate(): void;
```

### Registered Commands

| Command | Description |
|---------|-------------|
| `agentlens.refresh` | Manually refresh all telemetry data |
| `agentlens.showContextWindow` | Open the context window visualization panel |
| `agentlens.detectModel` | Force re-detection of the active AI model |
| `agentlens.showDocHealth` | Display the documentation health report |
| `agentlens.clearTracking` | Clear all tracked file data |

### Configuration Settings

Settings are defined under the `agentlens` namespace in `package.json`.

| Setting | Type | Default | Description |
|---------|------|---------|-------------|
| `agentlens.pollingInterval` | `number` | `2000` | Telemetry polling interval in milliseconds |
| `agentlens.enabled` | `boolean` | `true` | Enable or disable AgentLens monitoring |
| `agentlens.preferredAdapter` | `string` | `"auto"` | Preferred agent adapter (`"auto"`, `"copilot"`, `"cursor"`, `"cline"`) |
| `agentlens.docHealth.enabled` | `boolean` | `true` | Enable documentation health analysis |
| `agentlens.docHealth.includePatterns` | `string[]` | `["**/*.md"]` | Glob patterns for documentation files |

