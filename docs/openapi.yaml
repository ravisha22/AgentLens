## Types

All shared type definitions are exported from `types.ts`.

### `ContextWindowState`

```typescript
interface ContextWindowState {
  /** Number of tokens currently consumed. */
  tokensUsed: number;
  /** Maximum token capacity of the model's context window. */
  maxTokens: number;
  /** Utilization as a percentage (0–100). */
  utilizationPercent: number;
  /** Timestamp of the last update. */
  lastUpdated: Date;
}
```

### `ModelInfo`

```typescript
interface ModelInfo {
  /** Model identifier (e.g., "gpt-4o", "claude-3.5-sonnet"). */
  id: string;
  /** Human-readable model name. */
  name: string;
  /** Maximum context window size in tokens. */
  contextWindowSize: number;
  /** The provider or vendor (e.g., "openai", "anthropic"). */
  provider: string;
}
```

### `TrackedFile`

```typescript
interface TrackedFile {
  /** Absolute file path. */
  filePath: string;
  /** Relative path from workspace root. */
  relativePath: string;
  /** Estimated token count for this file's content in context. */
  tokenCount: number;
  /** How the file entered context. */
  source: 'user' | 'agent' | 'system';
  /** Timestamp when the file was added to context. */
  addedAt: Date;
}
```

### `AgentTelemetry`

```typescript
interface AgentTelemetry {
  /** Identifier of the agent adapter that produced this telemetry. */
  adapterId: string;
  /** Tokens currently in use. */
  tokensUsed: number;
  /** Detected model identifier. */
  modelId: string | undefined;
  /** Files currently in the agent's context. */
  files: TrackedFile[];
  /** Raw metadata from the agent (adapter-specific). */
  metadata: Record<string, unknown>;
  /** Timestamp of collection. */
  timestamp: Date;
}
```

### `TelemetryEvent`

```typescript
interface TelemetryEvent {
  /** Event type identifier. */
  type: 'contextChange' | 'modelChange' | 'fileAdded' | 'fileRemoved' | 'error';
  /** Event payload (shape depends on `type`). */
  data: unknown;
  /** Timestamp of the event. */
  timestamp: Date;
}
```

### `DocumentationHealthReport`

```typescript
interface DocumentationHealthReport {
  /** Overall health score (0–100). */
  score: number;
  /** Total number of documentation files analyzed. */
  totalFiles: number;
  /** Number of files considered stale. */
  staleFiles: number;
  /** Documentation coverage percentage across the project. */
  coveragePercent: number;
  /** Individual file assessments. */
  files: DocumentationFileHealth[];
  /** Timestamp of the analysis. */
  analyzedAt: Date;
}

interface DocumentationFileHealth {
  filePath: string;
  isStale: boolean;
  lastModified: Date;
  wordCount: number;
  issues: string[];
}
```

