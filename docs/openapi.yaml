## Providers

The `providers/` module implements VS Code UI components that surface data from the core modules.

### `AgentLensTreeDataProvider`

Provides data for the AgentLens sidebar tree view.

```typescript
class AgentLensTreeDataProvider implements vscode.TreeDataProvider<AgentLensTreeItem> {
  /**
   * Returns the tree item representation for the given element.
   */
  getTreeItem(element: AgentLensTreeItem): vscode.TreeItem;

  /**
   * Returns children of the given element, or root items if no element is provided.
   */
  getChildren(element?: AgentLensTreeItem): Promise<AgentLensTreeItem[]>;

  /**
   * Fires when tree data changes and the view should refresh.
   */
  readonly onDidChangeTreeData: vscode.Event<AgentLensTreeItem | undefined>;

  /**
   * Forces a refresh of the tree view.
   */
  refresh(): void;
}
```

### `AgentLensWebviewProvider`

Provides the webview panel for rich context window visualization.

```typescript
class AgentLensWebviewProvider implements vscode.WebviewViewProvider {
  /**
   * Called when the webview view is resolved and ready to receive content.
   * @param webviewView - The webview view instance provided by VS Code.
   */
  resolveWebviewView(
    webviewView: vscode.WebviewView,
    context: vscode.WebviewViewResolveContext,
    token: vscode.CancellationToken
  ): void;
}
```

### Webview Message Protocol

Communication between the extension host and the webview uses a structured message protocol.

#### Extension → Webview

```typescript
/** Sent when context window state updates. */
interface ContextUpdateMessage {
  type: 'contextUpdate';
  payload: {
    tokensUsed: number;
    maxTokens: number;
    utilizationPercent: number;
    model: ModelInfo | undefined;
    trackedFiles: TrackedFile[];
  };
}

/** Sent when documentation health report is available. */
interface DocHealthMessage {
  type: 'docHealth';
  payload: DocumentationHealthReport;
}
```

#### Webview → Extension

```typescript
/** User requests a manual refresh. */
interface RefreshRequestMessage {
  type: 'refreshRequest';
}

/** User requests to open a tracked file. */
interface OpenFileMessage {
  type: 'openFile';
  payload: {
    filePath: string;
  };
}
```

